apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: halo-data
  annotations:
    # Protect against accidental deletion via ArgoCD prune or kubectl delete.
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/part-of: halo
spec:
  accessModes:
    - ReadWriteOnce
  # storageClassName intentionally omitted in base — client overlay sets this
  # to match their provider (e.g. vultr-block-storage-hdd, do-block-storage).
  resources:
    requests:
      storage: 5Gi
