apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: halo-fleet
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: halo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "--config=/etc/nats/nats.conf"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          env:
            - name: HQ_PASS
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: HQ_PASS
            - name: ADVISOR_PASS
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: ADVISOR_PASS
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: nats-data
              mountPath: /data
            - name: nats-config
              mountPath: /etc/nats
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: nats-data
          persistentVolumeClaim:
            claimName: nats-data
        - name: nats-config
          configMap:
            name: nats-config
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: halo-fleet
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
    - name: monitor
      port: 8222
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-data
  namespace: halo-fleet
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
