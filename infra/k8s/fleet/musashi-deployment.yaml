apiVersion: apps/v1
kind: Deployment
metadata:
  name: advisor-musashi
  namespace: halo-fleet
  labels:
    app.kubernetes.io/name: advisor-musashi
    app.kubernetes.io/component: advisor
    app.kubernetes.io/part-of: halo
    halo/advisor: musashi
    halo/domain: body
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: advisor-musashi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: advisor-musashi
        app.kubernetes.io/component: advisor
        halo/advisor: musashi
    spec:
      imagePullSecrets:
        - name: vultr-cr
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: lhr.vultrcr.com/jeany/halo:fleet-latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Copy prompt from defaults if not present (ConfigMap is read-only)
              [ ! -f "$HERMES_HOME/system-prompt.md" ] && \
                cp /opt/defaults/system-prompt.md "$HERMES_HOME/system-prompt.md" 2>/dev/null || true
              # Ensure venv is on PATH for login shells (bash -lic resets PATH)
              echo 'export PATH="/opt/venv/bin:$PATH"' >> ~/.bashrc
              exec /opt/entrypoint.sh gateway
          env:
            - name: ADVISOR_NAME
              value: "musashi"
            - name: TZ
              value: "Europe/London"
            - name: PATH
              value: "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: NATS_URL
              value: "nats://nats.halo-fleet.svc.cluster.local:4222"
            - name: NATS_USER
              value: "advisor"
            - name: NATS_PASS
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: ADVISOR_PASS
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: advisor-config
              mountPath: /opt/defaults/config.yaml
              subPath: config.yaml
            - name: advisor-prompt
              mountPath: /opt/defaults/system-prompt.md
              subPath: system-prompt.md
            - name: advisor-secrets
              mountPath: /opt/data/.env
              subPath: .env
              readOnly: true
            - name: data
              mountPath: /opt/data/store
              subPath: store
            - name: data
              mountPath: /opt/data/sessions
              subPath: sessions
            - name: data
              mountPath: /opt/data/logs
              subPath: logs
          startupProbe:
            exec:
              command: ["python3", "-c", "import os; exit(0 if os.path.exists('/opt/data/heartbeat') else 1)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os,time; f='/opt/data/heartbeat'; exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
            periodSeconds: 60
      volumes:
        - name: advisor-config
          configMap:
            name: advisor-musashi-config
        - name: advisor-prompt
          configMap:
            name: advisor-musashi-prompt
        - name: advisor-secrets
          secret:
            secretName: advisor-musashi-secrets
            defaultMode: 0400
        - name: data
          emptyDir:
            sizeLimit: 500Mi
