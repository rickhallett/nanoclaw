apiVersion: apps/v1
kind: Deployment
metadata:
  name: advisor-machiavelli
  namespace: halo-fleet
  labels:
    app.kubernetes.io/name: advisor-machiavelli
    app.kubernetes.io/component: advisor
    app.kubernetes.io/part-of: halo
    halo/advisor: machiavelli
    halo/domain: machiavelli
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: advisor-machiavelli
  template:
    metadata:
      labels:
        app.kubernetes.io/name: advisor-machiavelli
        app.kubernetes.io/component: advisor
        halo/advisor: machiavelli
    spec:
      imagePullSecrets:
        - name: vultr-cr
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: halos-sync
          image: lhr.vultrcr.com/jeany/halo-halos:latest
          imagePullPolicy: Always
          command: ["cp", "-r", "/halos/halos/.", "/target/"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: halos-overlay
              mountPath: /target
        - name: state-init
          image: alpine:3.20
          command: ["sh", "-c", "mkdir -p /state/advisors/machiavelli"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: advisor-state
              mountPath: /state
      containers:
        - name: gateway
          image: lhr.vultrcr.com/jeany/halo:fleet-latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Copy prompt from defaults if not present (ConfigMap is read-only)
              [ ! -f "$HERMES_HOME/system-prompt.md" ] && \
                cp /opt/defaults/system-prompt.md "$HERMES_HOME/system-prompt.md" 2>/dev/null || true
              # Ensure venv is on PATH for login shells (bash -lic resets PATH)
              # /etc/profile resets PATH; .bash_profile sources .bashrc to restore it
              echo '[ -f ~/.bashrc ] && . ~/.bashrc' > ~/.bash_profile
              echo 'export PATH="/opt/venv/bin:$PATH"' >> ~/.bashrc
              exec /opt/entrypoint.sh gateway
          env:
            - name: ADVISOR_NAME
              value: "machiavelli"
            - name: ADVISOR_TOUCHBASE_SCHEDULE
              value: "20 7 * * *"
            - name: ADVISOR_TOUCHBASE_CHAT_ID
              value: "5967394003"
            - name: ADVISOR_TOUCHBASE_PLATFORM
              value: "telegram"
            - name: TZ
              value: "Europe/London"
            - name: PATH
              value: "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: PYTHONPATH
              value: "/opt/halos-overlay"
            - name: MEMCTL_CONFIG
              value: "/opt/config/memctl.yaml"
            - name: NATS_URL
              value: "nats://nats.halo-fleet.svc.cluster.local:4222"
            - name: NATS_USER
              value: "advisor"
            - name: NATS_PASS
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: ADVISOR_PASS
            - name: API_SERVER_ENABLED
              value: "true"
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: advisor-config
              mountPath: /opt/defaults/config.yaml
              subPath: config.yaml
            - name: advisor-prompt
              mountPath: /opt/defaults/system-prompt.md
              subPath: system-prompt.md
            - name: advisor-secrets
              mountPath: /opt/data/.env
              subPath: .env
              readOnly: true
            - name: advisor-state
              mountPath: /opt/data
              subPath: advisors/machiavelli
            - name: halos-overlay
              mountPath: /opt/halos-overlay/halos
              readOnly: true
            - name: aura-transcript
              mountPath: /opt/data/data/observations/aura
              readOnly: true
            - name: data
              mountPath: /opt/data/store
              subPath: store
            - name: data
              mountPath: /opt/data/sessions
              subPath: sessions
            - name: data
              mountPath: /opt/data/logs
              subPath: logs
            - name: profiles
              mountPath: /opt/data/data/advisors
              readOnly: true
            - name: memory-nfs
              mountPath: /memory
              readOnly: true
            - name: memctl-config
              mountPath: /opt/config/memctl.yaml
              subPath: memctl.yaml
              readOnly: true
          startupProbe:
            exec:
              command: ["python3", "-c", "import os; exit(0 if os.path.exists('/opt/data/heartbeat') else 1)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os,time; f='/opt/data/heartbeat'; exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
            periodSeconds: 60
      volumes:
        - name: advisor-config
          configMap:
            name: advisor-machiavelli-config
        - name: advisor-prompt
          configMap:
            name: advisor-machiavelli-prompt
        - name: advisor-secrets
          secret:
            secretName: advisor-machiavelli-secrets
            defaultMode: 0400
        - name: aura-transcript
          configMap:
            name: aura-session-transcript
        - name: halos-overlay
          emptyDir:
            sizeLimit: 10Mi
        - name: data
          emptyDir:
            sizeLimit: 500Mi
        - name: advisor-state
          nfs:
            server: 10.100.54.223
            path: /
        - name: memory-nfs
          nfs:
            server: 10.100.54.223
            path: /
        - name: memctl-config
          configMap:
            name: memctl-reader-config
        - name: profiles
          configMap:
            name: advisor-profiles
            items:
              - key: seneca-profile.md
                path: seneca/profile.md
              - key: sun-tzu-profile.md
                path: sun-tzu/profile.md
              - key: medici-profile.md
                path: medici/profile.md
