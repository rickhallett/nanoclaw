# Advisor API Services — expose Hermes HTTP API (port 8642) for
# agent-native CLI access via advisorctl.
#
# ClusterIP only — not externally reachable. Access from:
#   - In-cluster: http://advisor-{name}.halo-fleet.svc.cluster.local:8642
#   - Local dev:  kubectl port-forward -n halo-fleet svc/advisor-{name} 8642:8642
---
apiVersion: v1
kind: Service
metadata:
  name: advisor-musashi
  namespace: halo-fleet
  labels:
    app.kubernetes.io/name: advisor-musashi
    app.kubernetes.io/component: advisor
    app.kubernetes.io/part-of: halo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: advisor-musashi
  ports:
    - name: api
      port: 8642
      targetPort: api
      protocol: TCP
---
