apiVersion: apps/v1
kind: Deployment
metadata:
  name: halo-gateway
  namespace: halo-aura
spec:
  template:
    spec:
      containers:
        - name: gateway
          args:
            - gateway
          image: localhost:5000/halo:dev
        - name: aura-relay
          image: localhost:5000/halo:dev
          imagePullPolicy: Always
          command: ["python3", "-m", "halos.eventsource.aura_relay"]
          env:
            - name: SESSIONS_DIR
              value: "/opt/data/sessions"
            - name: NATS_URL
              value: "nats://nats.halo-fleet.svc.cluster.local:4222"
            - name: NATS_USER
              value: "hq"
            - name: NATS_PASS
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: HQ_PASS
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /opt/data
              readOnly: true
