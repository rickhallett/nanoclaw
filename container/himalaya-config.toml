# Container-specific himalaya config
# Auth: reads passwords from env vars (set by credential proxy)
# Host config uses secret-tool; this uses printenv for container context

[accounts.gmail]
email = "kai@oceanheart.ai"
display-name = "Kai Hallett"
default = true

folder.aliases.inbox = "INBOX"
folder.aliases.sent = "[Gmail]/Sent Mail"
folder.aliases.drafts = "[Gmail]/Drafts"
folder.aliases.trash = "[Gmail]/Trash"

backend.type = "imap"
backend.host = "imap.gmail.com"
backend.port = 993
backend.login = "kai@oceanheart.ai"
backend.auth.type = "password"
backend.auth.cmd = "printenv HIMALAYA_GMAIL_PASSWORD"

message.send.backend.type = "smtp"
message.send.backend.host = "smtp.gmail.com"
message.send.backend.port = 465
message.send.backend.login = "kai@oceanheart.ai"
message.send.backend.auth.type = "password"
message.send.backend.auth.cmd = "printenv HIMALAYA_GMAIL_PASSWORD"
