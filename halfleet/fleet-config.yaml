# halfleet — fleet provisioning configuration
#
# Drives `halctl create` and `halctl push`. Each profile maps a user
# to a personality template and set of shared services.

base:
  source: ~/code/nanoclaw
  exclude:
    - memory/              # prime's memory
    - .claude/projects/    # prime's project memory
    - data/                # fleet data (prime only)
    - queue/               # prime's work queue
    - backlog/             # legacy
    - docs/d2/             # internal specs
    - nanoclaw.db          # prime's database
    - groups/              # prime's groups
    - .env*                # prime's secrets
    - halfleet/            # fleet infra (prime only)
    - briefings.yaml       # prime's briefing config
    - cronctl.yaml         # prime's cron config
    - cron/                # prime's cron jobs
    - memory/reflections/  # prime's reflections
  lock:                    # read-only after copy (chmod 444/555, owned by rick)
    - CLAUDE.md
    - .claude/
    - halos/
    - src/
    - container/
  open:                    # read-write (owned by service user)
    - workspace/
    - projects/
    - groups/
    - memory/
    - data/
  lock_exemptions:         # subdirs of locked paths that must stay writable
    - .claude/skills       # cpSync copies into session dirs, preserves perms
    - .claude/hooks        # hooks need write access at runtime
    - container/skills     # same cpSync issue

profiles:
  default:
    personality: default
    services: []
    telegram_bot_name: null
  ben:
    personality: discovering-ben
    services: [gh, vercel, neonctl]
    telegram_bot_name: HALBen_bot
