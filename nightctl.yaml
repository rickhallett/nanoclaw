queue_dir: ./queue
manifest_file: ./queue/MANIFEST.yaml
archive_dir: ./queue/archive
runs_dir: ./queue/runs

execution:
  mode: serial
  max_workers: 1
  overnight_window: "02:00-05:00"
  timezone: "Europe/London"

job:
  default_retries: 2
  default_timeout_secs: 300
  default_schedule: overnight
  valid_schedules:
    - overnight
    - immediate
    - once
  valid_tags:
    - maintenance
    - memctl
    - data
    - sync
    - report
    - cleanup
    - backup
    - infra
    - halos
    - architecture

notify:
  on_failure: true
  on_success: false
  channel: main

manifest:
  hash_algorithm: sha256

archive:
  retention_days: 30
  dry_run: true
