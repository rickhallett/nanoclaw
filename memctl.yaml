memory_dir: ./memory
index_file: ./memory/INDEX.md
archive_dir: ./memory/archive
backlink_dir: ./memory/backlinks

note:
  tags:
    - anti-pattern
    - architecture
    - auth
    - blocker
    - career
    - communication
    - contemplative
    - context-engineering
    - database
    - deadline
    - debt
    - decision
    - deployment
    - engineering
    - family
    - finance
    - freelance
    - governance
    - hci
    - identity
    - infra
    - job-search
    - layer-model
    - nanoclaw
    - person
    - postgres
    - practice
    - project
    - relationship
    - resolved
    - security
    - slopodar
    - stack
    - standing-order
    - strategy
    - the-pit
    - verification
    - vulnerability
    - weaver
    - wellbeing
    - writing
    - zen
  valid_types:
    - decision
    - fact
    - reference
    - project
    - person
    - event
  valid_confidence:
    - high
    - medium
    - low

index:
  max_summary_chars: 120
  hash_algorithm: sha256

enrich:
  noise_tags:
    - decision
    - person
    - nanoclaw
    - the-pit
    - identity
    - standing-order
  noise_entities:
    - kai
    - the-pit
  default_threshold: 7
  verbose_threshold: 5

prune:
  half_life_days: 30
  min_score: 0.15
  min_backlinks_to_exempt: 1
  dry_run: true
  tombstone_retention_days: 90
