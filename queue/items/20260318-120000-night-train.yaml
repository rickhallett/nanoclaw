id: "20260318-120000-night-train"
title: "Night train — accumulated items from 2026-03-18 session"
kind: task
status: open
priority: medium
tags: [fleet, logctl, halctl, observability, assessments]
context: |
  Items parked during the marathon 29-commit session. Ordered by ROI.

items:
  - title: "logctl correlation ID"
    priority: high
    detail: |
      Write a UUID at message ingestion time in index.ts (storeMessage).
      Log the same UUID alongside Agent output in container-runner.
      logctl --conversations joins on UUID instead of timestamp heuristics.
      Eliminates the pairing bug that made the operator blind during outage.

  - title: "halctl notify <instance> <message>"
    priority: high
    detail: |
      Wrap the curl-to-bot-API pattern as a halctl subcommand.
      Reads bot token from .env.token. Sends to registered main group JID.
      Used for system notifications to users after governance pushes.

  - title: "halctl push — atomic lifecycle"
    priority: high
    detail: |
      push + kill container + clear sessions + restart pm2 as one operation.
      Current three-step manual process has race conditions that leave
      the message queue in a dead state. Ben hit this twice today.

  - title: "logctl trace refinement"
    priority: medium
    detail: |
      Trace command needs correlation IDs (see above) to work properly.
      Once IDs exist, trace becomes: given a message UUID, show every
      hop from ingestion to delivery.

  - title: "Cold start / warm start smoke test scenarios"
    priority: medium
    detail: |
      halctl smoke should test both fresh container spawn and piped
      message to existing container. Different failure modes each way.

  - title: "Kill switch smoke test"
    priority: medium
    detail: |
      halctl freeze/fold/fry tested live. Verify pm2 actually stops,
      bot stops polling, and recovery works on unfreeze.

  - title: "Post-assessment trigger mechanism"
    priority: low
    detail: |
      halctl assess --phase post or time-based trigger (after 30 days).
      Delivers the mirror questions (hope_post, feeling_post).

  - title: "Nightly briefing fleet integration"
    priority: low
    detail: |
      hal-briefing includes fleet health: instance status, error rates,
      conversation volume, assessment completion.

  - title: "Ben's conversations.json import"
    priority: low
    detail: |
      Parser for Claude export format. Extract durable claims via
      discovering-ben protocol. Agent-driven with right starting questions
      rather than bulk parse of 255 conversations.

