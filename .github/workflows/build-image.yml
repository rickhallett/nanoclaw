name: Build Halo Image
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate vendor directory
        run: |
          test -f vendor/hermes-agent/pyproject.toml \
            || { echo "::error::vendor/hermes-agent is empty — submodule not checked out"; exit 1; }

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: aquasecurity/trivy-action@master
        env:
          TRIVY_SKIP_DIRS: vendor
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 1
          severity: CRITICAL,HIGH

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/rickhallett/halo:${{ github.ref_name }}
          # No :latest tag — mutable tags in production registries allow
          # silent image replacement. All manifests must reference pinned versions.
          build-args: |
            INSTALL_BROWSER=false
