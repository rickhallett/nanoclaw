name: Build Fleet Image

on:
  workflow_dispatch:
  push:
    branches: [feat/containerisation, main]
    paths:
      - 'Dockerfile'
      - 'halos/**'
      - 'pyproject.toml'
      - 'docker/**'
      - 'data/advisors/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/login-action@v3
        with:
          registry: lhr.vultrcr.com
          username: ${{ secrets.VULTR_CR_USER }}
          password: ${{ secrets.VULTR_CR_PASS }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            lhr.vultrcr.com/jeany/halo:${{ github.sha }}
            lhr.vultrcr.com/jeany/halo:fleet-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
